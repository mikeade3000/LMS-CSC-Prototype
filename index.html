<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Lagos State Civil Service Commission — Learning Management System">
  <meta name="robots" content="noindex, nofollow">
  <title>CSC Lagos LMS v3 — Civil Service Commission</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏛️</text></svg>">
  <script>
    (function(){
      document.addEventListener('contextmenu',function(e){e.preventDefault();return false;});
      document.addEventListener('keydown',function(e){
        var b=e.key==='F12'||
          (e.ctrlKey&&e.shiftKey&&(e.key==='I'||e.key==='J'||e.key==='C'||e.key==='K'))||
          (e.ctrlKey&&(e.key==='u'||e.key==='U'||e.key==='s'||e.key==='S'||e.key==='p'||e.key==='P'))||
          (e.metaKey&&e.altKey&&(e.key==='i'||e.key==='I'));
        if(b){e.preventDefault();e.stopPropagation();return false;}
      },true);
      document.addEventListener('selectstart',function(e){
        if(e.target.tagName!=='INPUT'&&e.target.tagName!=='TEXTAREA')e.preventDefault();
      });
    })();
  </script>
</head>
<body>
  <div id="devtools-warn" style="display:none;position:fixed;inset:0;background:#1a6b3c;z-index:99999;align-items:center;justify-content:center;flex-direction:column;color:#fff;text-align:center;padding:32px;">
    <h2 style="font-size:2rem;margin-bottom:12px;">🔒 Access Restricted</h2>
    <p>Developer Tools are not permitted on this platform.</p>
    <p>Please close Developer Tools to continue.</p>
  </div>
  <div id="app">
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;
      background:linear-gradient(135deg,#0d4a2a,#1a6b3c);color:#fff;flex-direction:column;gap:16px;">
      <div style="font-size:3rem;">🏛️</div>
      <p style="font-size:1rem;opacity:.8;font-family:sans-serif;">Loading CSC LMS v3…</p>
    </div>
  </div>
  <script>
    // Safety net: if a script error stops the app from loading, show a message
    // instead of an infinite loading splash.
    window.addEventListener('error', function(ev){
      var appEl = document.getElementById('app');
      if (appEl && appEl.innerHTML.indexOf('Loading CSC LMS') !== -1) {
        appEl.innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;'+
          'justify-content:center;background:linear-gradient(135deg,#0d4a2a,#1a6b3c);'+
          'color:#fff;flex-direction:column;gap:14px;text-align:center;padding:24px;'+
          'font-family:sans-serif;">'+
          '<div style="font-size:2.5rem;">⚠️</div>'+
          '<h2 style="margin:0;">Unable to load the LMS</h2>'+
          '<p style="opacity:.85;max-width:420px;">A loading error occurred. Please refresh the page. '+
          'If the problem persists, clear your browser cache and try again.</p>'+
          '<button onclick="location.reload()" style="margin-top:8px;padding:10px 24px;'+
          'background:#c9922a;color:#fff;border:none;border-radius:8px;font-size:.9rem;'+
          'font-weight:600;cursor:pointer;">↻ Refresh Page</button>'+
          '</div>';
      }
    });
  </script>
  <script src="js/content.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
